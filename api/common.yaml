openapi: 3.0.3
info:
  title: AgentBase 公共组件
  description: AgentBase 平台 API 的公共可复用组件定义
  version: 1.0.0

paths: {}

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 使用 JWT Bearer Token 进行身份认证

  parameters:
    PageParam:
      name: page
      in: query
      description: 页码（从 1 开始）
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      example: 1

    PageSizeParam:
      name: page_size
      in: query
      description: 每页返回的记录数
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
      example: 50

  schemas:
    Pagination:
      type: object
      description: 分页信息
      required:
        - page
        - page_size
        - total
        - total_pages
      properties:
        page:
          type: integer
          description: 当前页码
          minimum: 1
          example: 1
        page_size:
          type: integer
          description: 每页记录数
          minimum: 1
          example: 50
        total:
          type: integer
          description: 总记录数
          minimum: 0
          example: 3
        total_pages:
          type: integer
          description: 总页数
          minimum: 0
          example: 1

    Error:
      type: object
      description: 标准错误响应
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: 错误代码
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: 错误描述
          example: "请求参数验证失败"
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                description: 错误字段
              message:
                type: string
                description: 字段错误信息
          description: 详细错误信息
          example:
            - field: "name"
              message: "名称不能为空"

  responses:
    BadRequest:
      description: 客户端请求错误（参数验证失败）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "BAD_REQUEST"
            message: "请求参数验证失败"
            details:
              - field: "name"
                message: "名称不能为空"

    Unauthorized:
      description: 未认证或认证失败
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "UNAUTHORIZED"
            message: "未提供有效的身份认证凭据"

    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "NOT_FOUND"
            message: "指定的资源不存在"

    InternalError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "INTERNAL_ERROR"
            message: "服务器处理请求时发生错误"

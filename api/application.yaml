openapi: 3.0.3
info:
  title: AgentBase 部署实例管理 API
  description: |
    AgentBase 平台部署实例管理 API，提供统一的资源部署能力。

    ## 支持的资源类型
    - **LOW_CODE_PLATFORM** - 低代码平台（如 FastGPT），通过 Helm Chart 部署
    - **HIGH_CODE_APP** - 高代码应用，支持容器镜像或 Helm Chart 两种部署模式
    - **DEV_ENVIRONMENT** - 高代码开发环境（如 LangGraph、CrewAI），通过 Helm Chart 部署
    - **GATEWAY** - 网关实例，通过 Helm Chart 部署
    - **DATA_SERVICE** - 数据服务组件（如 PGVector、Redis、MongoDB），通过 Helm Chart 部署

    ## 设计理念
    - 统一抽象的部署接口，一个端点支持所有资源类型的创建
    - 公共基础设施参数通过 `ApplicationCreateBase` 结构化定义
    - 每种资源类型拥有独立 Schema，通过 `allOf` 继承公共基础并定义类型专属的 `extra_params`
    - 使用 `oneOf` + `discriminator` 按 `resource_type` 自动分发到对应 Schema
    - `extra_params` 保留 `additionalProperties: true`，后端接收后直接渲染为 YAML 格式
  version: 1.0.0
  contact:
    name: AgentBase Team
    email: support@example.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://agentbase.aether.com/api/v1
    description: 生产环境
  - url: https://test.agentbase.aether.com/api/v1
    description: 测试环境
  - url: http://localhost:8080/api/v1
    description: 本地开发环境

tags:
  - name: applications
    description: 部署实例的创建、查询、更新、删除及生命周期管理

security:
  - BearerAuth: []

paths:
  /applications:
    get:
      tags:
        - applications
      summary: 获取部署实例列表
      description: 获取分页的部署实例列表，支持按资源类型、状态、集群、创建人、名称筛选，以及按各资源类型的子类型（模板、平台类型、服务类型）筛选
      operationId: listApplications
      parameters:
        - $ref: 'common.yaml#/components/parameters/PageParam'
        - $ref: 'common.yaml#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/WorkspaceIdParam'
        - name: resource_type
          in: query
          description: 按资源类型筛选（支持多选）
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - LOW_CODE_PLATFORM
                - HIGH_CODE_APP
                - DEV_ENVIRONMENT
                - GATEWAY
                - DATA_SERVICE
          style: form
          explode: true
        - name: status
          in: query
          description: 按实例状态筛选（支持多选）
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - CREATING
                - UPDATING
                - STARTING
                - STOPPING
                - RESTARTING
                - RUNNING
                - STOPPED
                - ERROR
                - DELETING
          style: form
          explode: true
        - name: cluster_id
          in: query
          description: 按 K8s 集群 ID 筛选（支持多选）
          required: false
          schema:
            type: array
            items:
              type: string
              format: uuid
          style: form
          explode: true
        - name: creator_name
          in: query
          description: 按创建人用户名称筛选（支持多选）
          required: false
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
        - name: search
          in: query
          description: 按名称或描述模糊搜索
          required: false
          schema:
            type: string
        - name: sort
          in: query
          description: 排序字段
          required: false
          schema:
            type: string
            enum: [created_at, updated_at, name]
            default: created_at
        - name: order
          in: query
          description: 排序方向
          required: false
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
        - name: template
          in: query
          description: |
            按开发环境模板筛选（仅 resource_type 为 DEV_ENVIRONMENT 时有效，支持多选）。
            传入其他 resource_type 时此参数将被忽略。
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - CREWAI
                - LANGGRAPH
          style: form
          explode: true
        - name: platform_type
          in: query
          description: |
            按低代码平台类型筛选（仅 resource_type 为 LOW_CODE_PLATFORM 时有效，支持多选）。
            传入其他 resource_type 时此参数将被忽略。
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - FASTGPT
                - DIFY
          style: form
          explode: true
        - name: service_type
          in: query
          description: |
            按数据服务类型筛选（仅 resource_type 为 DATA_SERVICE 时有效，支持多选）。
            传入其他 resource_type 时此参数将被忽略。
          required: false
          schema:
            type: array
            items:
              type: string
              enum:
                - POSTGRES
                - REDIS
                - MEM0
                - MILVUS
                - WEAVIATE
                - PGVECTOR
                - NEBULA_GRAPH
                - MONGODB
          style: form
          explode: true
      responses:
        '200':
          description: 成功获取部署实例列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '500':
          $ref: 'common.yaml#/components/responses/InternalError'

    post:
      tags:
        - applications
      summary: 创建部署实例
      description: |
        创建一个新的部署实例。请求体通过 `resource_type` 字段自动分发到对应的资源 Schema：

        | resource_type | Schema | 支持的 deploy_mode |
        |---|---|---|
        | LOW_CODE_PLATFORM | LowCodePlatformCreate | CHART |
        | HIGH_CODE_APP | HighCodeAppCreate | IMAGE, CHART |
        | DEV_ENVIRONMENT | DevEnvironmentCreate | CHART |
        | GATEWAY | GatewayCreate | CHART |
        | DATA_SERVICE | DataServiceCreate | CHART |

        公共基础设施参数（集群、计算、网络、存储、服务绑定、认证）在所有类型间共享，
        各类型通过 `extra_params` 传递业务专属配置。
      operationId: createApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreate'
            examples:
              high_code_app_image:
                summary: 高代码应用（容器镜像部署）
                value:
                  name: "my-agent-app"
                  description: "智能客服 Agent 应用"
                  resource_type: "HIGH_CODE_APP"
                  deploy_mode: "IMAGE"
                  workspace_id: "w1x2y3z4-a5b6-7890-cdef-123456789abc"
                  source:
                    registry_id: "r1s2t3u4-v5w6-7890-abcd-ef1234567890"
                    image: "myproject/my-agent:v1.0"
                  cluster_id: "c1d2e3f4-a5b6-7890-cdef-123456789abc"
                  compute:
                    cpu: "4"
                    memory: "8Gi"
                    replicas:
                      mode: "FIXED"
                      count: 2
                  network:
                    ports:
                      - container_port: 9080
                        protocol: "TCP"
                        service_type: "EXTERNAL"
                        route:
                          domain: "my-agent-app.agentbase.com"
                          path: "/"
                          path_match_type: "PREFIX"
                          case_insensitive: false
                      - container_port: 8080
                        protocol: "TCP"
                        service_type: "CLUSTER_INTERNAL"
                  storage:
                    volumes:
                      - name: "data-vol"
                        size: "10Gi"
                        mount_path: "/data"
                        storage_class: "standard"
                  services:
                    ai_database:
                      enabled: true
                      instance_id: "db-001"
                    memory_store:
                      enabled: true
                      instance_id: "mem-001"
                    ai_model:
                      enabled: true
                      model_id: "model-001"
                    mcp_service:
                      enabled: true
                      endpoint: "https://mcp.agentbase.com"
                    internet_access:
                      enabled: true
                      auto_inject_env: true
                  auth:
                    type: "API_KEY"
                    api_key:
                      name: "API Key 01"
                      header_name: "X-API-Key"
                  extra_params:
                    pods:
                      - name: "pod-1"
                        source:
                          registry_id: "r1s2t3u4-v5w6-7890-abcd-ef1234567890"
                          image: "myproject/my-agent:v1.0"
                        replicas: 2
                        cpu: "4"
                        memory: "8Gi"
                        storage:
                          volumes:
                            - name: "data-vol"
                              size: "10Gi"
                              mount_path: "/data"
                              storage_class: "standard"
                        ports:
                          - container_port: 8081
                            protocol: "TCP"
                            service_type: "EXTERNAL"
                            route:
                              domain: "my-agent-app.agentbase.com"
                              path: "/"
                              path_match_type: "PREFIX"
                          - container_port: 8082
                            protocol: "TCP"
                            service_type: "CLUSTER_INTERNAL"
                        start_command: "python main.py --port 8081"
                        env_vars:
                          - key: "OPENAI_API_KEY"
                            value: "sk-xxx"
                          - key: "OPENAI_BASE_URL"
                            value: "https://api.openai.com"
                        config_files:
                          - name: "config.yaml"
                            file_id: "cfg-001"
                      - name: "pod-2"
                        source:
                          registry_id: "r1s2t3u4-v5w6-7890-abcd-ef1234567890"
                          image: "myproject/my-worker:v1.0"
                        replicas: 2
                        cpu: "4"
                        memory: "8Gi"
                        ports:
                          - container_port: 9090
                            protocol: "TCP"
                            service_type: "CLUSTER_INTERNAL"
                        start_command: "python worker.py"
                        env_vars:
                          - key: "LOG_LEVEL"
                            value: "info"
                    distribution:
                      mode: "FULL"
                    api_data_format: "JSON"
                    api_key: "sk-app-xxx"
                    data_source_port: 5432
              high_code_app_chart:
                summary: 高代码应用（Helm Chart 部署）
                value:
                  name: "my-chart-app"
                  description: "通过 Helm Chart 部署的应用"
                  resource_type: "HIGH_CODE_APP"
                  deploy_mode: "CHART"
                  workspace_id: "w1x2y3z4-a5b6-7890-cdef-123456789abc"
                  source:
                    registry_id: "r1s2t3u4-v5w6-7890-abcd-ef1234567890"
                    chart: "myproject/my-chart"
                    chart_version: "1.2.0"
                    values_override:
                      replicaCount: 2
                      image:
                        tag: "v1.0"
                  cluster_id: "c1d2e3f4-a5b6-7890-cdef-123456789abc"
                  services:
                    ai_database:
                      enabled: true
                      instance_id: "db-001"
                  auth:
                    type: "API_KEY"
                    api_key:
                      name: "API Key 01"
                      header_name: "X-API-Key"
                  extra_params:
                    pods:
                      - name: "pod-1"
                        source:
                          registry_id: "r1s2t3u4-v5w6-7890-abcd-ef1234567890"
                          chart: "myproject/my-chart"
                          chart_version: "1.2.0"
                        replicas: 2
                        cpu: "4"
                        memory: "8Gi"
                        ports:
                          - container_port: 8080
                            protocol: "TCP"
                            service_type: "EXTERNAL"
                        env_vars:
                          - key: "DB_HOST"
                            value: "postgres.svc"
                    distribution:
                      mode: "TARGETED"
                      canary_weight: 20
                      canary_header: "X-Canary"
                    api_data_format: "JSON"
                    api_key: "sk-app-xxx"
                    data_source_port: 5432
                    data_catalog:
                      hierarchy_type: "LEVEL"
                      hierarchy_name: "生产等级"
              low_code_platform:
                summary: 低代码平台（FastGPT）
                value:
                  name: "fastgpt-prod"
                  description: "生产环境 FastGPT 平台"
                  resource_type: "LOW_CODE_PLATFORM"
                  deploy_mode: "CHART"
                  workspace_id: "w1x2y3z4-a5b6-7890-cdef-123456789abc"
                  source:
                    registry_id: "r1s2t3u4-v5w6-7890-abcd-ef1234567890"
                    chart: "agentbase/fastgpt"
                    chart_version: "4.8.0"
                  cluster_id: "c1d2e3f4-a5b6-7890-cdef-123456789abc"
                  network:
                    load_balancer_id: "lb-4090"
                  extra_params:
                    platform_type: "FASTGPT"
                    admin_account: "admin"
                    admin_password: "secureP@ss123"
                    license_file_id: "lic-001"
                    components:
                      platform_manager:
                        replicas: 2
                        cpu_request: "1"
                        cpu_limit: "2"
                        memory_request: "2Gi"
                        memory_limit: "4Gi"
                        pod_name: "fastgpt-server"
                        storage_class: "standard"
                        volume_size: "10Gi"
                      ingress:
                        replicas: 2
                        cpu_request: "0.5"
                        cpu_limit: "1"
                        memory_request: "1Gi"
                        memory_limit: "2Gi"
                        load_balancer_id: "lb-4090"
                      pgvector:
                        replicas: 2
                        cpu_request: "2"
                        cpu_limit: "4"
                        memory_request: "4Gi"
                        memory_limit: "8Gi"
                        storage_class: "ssd"
                        volume_size: "50Gi"
                        default_username: "pguser"
                        default_password: "secureP@ss"
                      redis:
                        replicas: 2
                        cpu_request: "1"
                        cpu_limit: "2"
                        memory_request: "2Gi"
                        memory_limit: "4Gi"
                        storage_class: "standard"
                        volume_size: "10Gi"
                      mongodb:
                        replicas: 2
                        cpu_request: "2"
                        cpu_limit: "4"
                        memory_request: "4Gi"
                        memory_limit: "8Gi"
                        storage_class: "ssd"
                        volume_size: "100Gi"
                        default_username: "mongouser"
                        default_password: "secureP@ss"
              dev_environment:
                summary: 高代码开发环境（CrewAI）
                value:
                  name: "crewai-dev-env"
                  description: "CrewAI 开发环境"
                  resource_type: "DEV_ENVIRONMENT"
                  deploy_mode: "CHART"
                  workspace_id: "w1x2y3z4-a5b6-7890-cdef-123456789abc"
                  source:
                    registry_id: "r1s2t3u4-v5w6-7890-abcd-ef1234567890"
                    chart: "agentbase/dev-environment"
                    chart_version: "1.0.0"
                  cluster_id: "c1d2e3f4-a5b6-7890-cdef-123456789abc"
                  compute:
                    cpu: "4"
                    memory: "8Gi"
                  network:
                    ports:
                      - container_port: 8080
                        protocol: "TCP"
                        service_type: "EXTERNAL"
                        route:
                          domain: "crewai-dev.agentbase.com"
                          path: "/"
                          path_match_type: "PREFIX"
                          case_insensitive: false
                      - container_port: 6060
                        protocol: "TCP"
                        service_type: "EXTERNAL"
                        route:
                          domain: "crewai-dev.agentbase.com"
                          path: "/debug"
                          path_match_type: "PREFIX"
                  extra_params:
                    template: "CREWAI"
              gateway:
                summary: 网关实例
                value:
                  name: "gateway-prod"
                  description: "生产环境网关"
                  resource_type: "GATEWAY"
                  deploy_mode: "CHART"
                  workspace_id: "w1x2y3z4-a5b6-7890-cdef-123456789abc"
                  source:
                    registry_id: "r1s2t3u4-v5w6-7890-abcd-ef1234567890"
                    chart: "agentbase/gateway"
                    chart_version: "2.0.0"
                  cluster_id: "c1d2e3f4-a5b6-7890-cdef-123456789abc"
                  compute:
                    cpu: "2"
                    memory: "4Gi"
                  network:
                    load_balancer_id: "lb-4090"
              data_service:
                summary: 数据服务组件（PGVector）
                value:
                  name: "pgvector-shared"
                  description: "共享向量数据库"
                  resource_type: "DATA_SERVICE"
                  deploy_mode: "CHART"
                  workspace_id: "w1x2y3z4-a5b6-7890-cdef-123456789abc"
                  source:
                    registry_id: "r1s2t3u4-v5w6-7890-abcd-ef1234567890"
                    chart: "agentbase/pgvector"
                    chart_version: "0.5.0"
                  cluster_id: "c1d2e3f4-a5b6-7890-cdef-123456789abc"
                  compute:
                    cpu: "4"
                    memory: "8Gi"
                  storage:
                    volumes:
                      - name: "pgdata"
                        size: "100Gi"
                        mount_path: "/var/lib/postgresql/data"
                        storage_class: "ssd"
                  extra_params:
                    service_type: "PGVECTOR"
                    config:
                      max_connections: 200
                      shared_buffers: "2GB"
                      effective_cache_size: "6GB"
      responses:
        '202':
          description: 创建请求已接受，异步执行中。通过 GET /applications/{application_id} 轮询状态，status 从 CREATING 变为 RUNNING 或 ERROR 表示完成。
          headers:
            Location:
              description: 资源轮询地址
              schema:
                type: string
                format: uri
                example: "/api/v1/applications/a1b2c3d4-e5f6-7890-abcd-ef1234567890"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '409':
          description: 同名部署实例已存在
          content:
            application/json:
              schema:
                $ref: 'common.yaml#/components/schemas/Error'
              example:
                code: "CONFLICT"
                message: "同名部署实例已存在"
        '500':
          $ref: 'common.yaml#/components/responses/InternalError'

  /applications/{application_id}:
    parameters:
      - $ref: '#/components/parameters/ApplicationIdParam'
      - $ref: '#/components/parameters/WorkspaceIdParam'

    get:
      tags:
        - applications
      summary: 获取部署实例详情
      description: 根据 ID 获取单个部署实例的详细信息，包括完整的配置和运行状态
      operationId: getApplication
      responses:
        '200':
          description: 成功获取部署实例详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '500':
          $ref: 'common.yaml#/components/responses/InternalError'

    put:
      tags:
        - applications
      summary: 更新部署实例
      description: |
        更新已有的部署实例配置。仅允许在 STOPPED 状态下更新。
        `resource_type` 不允许修改，所有字段均为可选，仅更新传入的字段。
      operationId: updateApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationUpdate'
            example:
              description: "更新后的描述"
              compute:
                cpu: "8"
                memory: "16Gi"
                replicas:
                  mode: "AUTO_SCALING"
                  min_replicas: 2
                  max_replicas: 10
              services:
                ai_model:
                  enabled: true
                  model_id: "model-002"
              extra_params:
                env_vars:
                  - key: "LOG_LEVEL"
                    value: "debug"
      responses:
        '202':
          description: 更新请求已接受，异步执行中。资源 status 变为 UPDATING，完成后恢复为 STOPPED 或 ERROR。
          headers:
            Location:
              description: 资源轮询地址
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '500':
          $ref: 'common.yaml#/components/responses/InternalError'

    delete:
      tags:
        - applications
      summary: 删除部署实例
      description: 删除指定的部署实例。仅允许在 STOPPED 状态下删除。删除操作会清理所有关联的 K8s 资源。
      operationId: deleteApplication
      responses:
        '202':
          description: 删除请求已接受，异步执行中。资源 status 变为 DELETING，完成后资源被移除。
          headers:
            Location:
              description: 资源轮询地址
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '500':
          $ref: 'common.yaml#/components/responses/InternalError'

  /applications/{application_id}/actions/start:
    parameters:
      - $ref: '#/components/parameters/ApplicationIdParam'
      - $ref: '#/components/parameters/WorkspaceIdParam'
    post:
      tags:
        - applications
      summary: 启动部署实例
      description: 启动一个处于 STOPPED 或 ERROR 状态的部署实例
      operationId: startApplication
      responses:
        '202':
          description: 启动请求已接受，异步执行中。资源 status 变为 STARTING，完成后变为 RUNNING 或 ERROR。
          headers:
            Location:
              description: 资源轮询地址
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '500':
          $ref: 'common.yaml#/components/responses/InternalError'

  /applications/{application_id}/actions/stop:
    parameters:
      - $ref: '#/components/parameters/ApplicationIdParam'
      - $ref: '#/components/parameters/WorkspaceIdParam'
    post:
      tags:
        - applications
      summary: 停止部署实例
      description: 停止一个处于 RUNNING 状态的部署实例
      operationId: stopApplication
      responses:
        '202':
          description: 停止请求已接受，异步执行中。资源 status 变为 STOPPING，完成后变为 STOPPED 或 ERROR。
          headers:
            Location:
              description: 资源轮询地址
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '500':
          $ref: 'common.yaml#/components/responses/InternalError'

  /applications/{application_id}/actions/restart:
    parameters:
      - $ref: '#/components/parameters/ApplicationIdParam'
      - $ref: '#/components/parameters/WorkspaceIdParam'
    post:
      tags:
        - applications
      summary: 重启部署实例
      description: 重启一个处于 RUNNING 状态的部署实例（先停后启）
      operationId: restartApplication
      responses:
        '202':
          description: 重启请求已接受，异步执行中。资源 status 变为 RESTARTING，完成后变为 RUNNING 或 ERROR。
          headers:
            Location:
              description: 资源轮询地址
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
        '400':
          $ref: 'common.yaml#/components/responses/BadRequest'
        '401':
          $ref: 'common.yaml#/components/responses/Unauthorized'
        '404':
          $ref: 'common.yaml#/components/responses/NotFound'
        '500':
          $ref: 'common.yaml#/components/responses/InternalError'

components:
  securitySchemes:
    BearerAuth:
      $ref: 'common.yaml#/components/securitySchemes/BearerAuth'

  parameters:
    ApplicationIdParam:
      name: application_id
      in: path
      required: true
      description: 部署实例唯一标识
      schema:
        type: string
        format: uuid
      example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    WorkspaceIdParam:
      name: workspace_id
      in: query
      required: true
      description: 工作空间 ID
      schema:
        type: string
        format: uuid
      example: "w1x2y3z4-a5b6-7890-cdef-123456789abc"

  schemas:
    # ==================================================================
    # 公共基础组件
    # ==================================================================

    ApplicationSource:
      type: object
      description: |
        部署来源配置。根据 deploy_mode 不同，需要提供不同的字段：
        - IMAGE 模式：需提供 registry_id 和 image
        - CHART 模式：需提供 registry_id 和 chart
      properties:
        registry_id:
          type: string
          format: uuid
          description: 镜像仓库 ID
          example: "r1s2t3u4-v5w6-7890-abcd-ef1234567890"
        image:
          type: string
          description: 容器镜像路径（deploy_mode 为 IMAGE 时必填）
          example: "myproject/my-agent:v1.0"
        chart:
          type: string
          description: Helm Chart 路径（deploy_mode 为 CHART 时必填）
          example: "myproject/my-chart"
        chart_version:
          type: string
          description: Helm Chart 版本号（deploy_mode 为 CHART 时可选）
          example: "1.2.0"
        values_override:
          type: object
          additionalProperties: true
          description: |
            Helm values 覆盖配置（deploy_mode 为 CHART 时可选）。
            传入的对象会与 Chart 默认 values 合并，直接渲染为 YAML 格式。

    ComputeConfig:
      type: object
      description: 计算资源配置，包括 CPU、内存和副本策略
      properties:
        cpu:
          type: string
          description: |
            CPU 核数，支持 Kubernetes 资源格式。
            常用值：1, 2, 4, 8, 16
          example: "4"
        memory:
          type: string
          description: |
            内存大小，支持 Kubernetes 资源格式。
            常用值：512Mi, 1Gi, 2Gi, 4Gi, 8Gi, 16Gi, 32Gi
          example: "8Gi"
        replicas:
          $ref: '#/components/schemas/ReplicaConfig'

    ReplicaConfig:
      type: object
      description: 副本配置策略
      properties:
        mode:
          type: string
          enum: [FIXED, AUTO_SCALING]
          description: |
            副本模式：
            - FIXED：固定副本数量
            - AUTO_SCALING：根据负载弹性伸缩（HPA）
          default: "FIXED"
          example: "FIXED"
        count:
          type: integer
          minimum: 1
          description: 固定副本数（mode 为 FIXED 时生效）
          default: 1
          example: 2
        min_replicas:
          type: integer
          minimum: 1
          description: 最小副本数（mode 为 AUTO_SCALING 时生效）
          example: 1
        max_replicas:
          type: integer
          minimum: 1
          description: 最大副本数（mode 为 AUTO_SCALING 时生效）
          example: 10
        cpu_threshold:
          type: integer
          minimum: 1
          maximum: 100
          description: CPU 利用率阈值百分比，超过此值触发扩容（mode 为 AUTO_SCALING 时生效）
          example: 80
        memory_threshold:
          type: integer
          minimum: 1
          maximum: 100
          description: 内存利用率阈值百分比，超过此值触发扩容（mode 为 AUTO_SCALING 时生效）
          example: 80

    NetworkConfig:
      type: object
      description: 网络配置，包括负载均衡和端口暴露规则
      properties:
        load_balancer_id:
          type: string
          description: 关联的负载均衡实例 ID
          example: "lb-4090"
        ports:
          type: array
          description: 端口配置列表
          items:
            $ref: '#/components/schemas/PortConfig'

    PortConfig:
      type: object
      description: 单个端口的暴露配置
      required:
        - container_port
      properties:
        container_port:
          type: integer
          minimum: 1
          maximum: 65535
          description: 容器暴露端口
          example: 8080
        protocol:
          type: string
          enum: [TCP, UDP]
          default: "TCP"
          description: 传输协议
          example: "TCP"
        service_type:
          type: string
          enum: [CLUSTER_INTERNAL, EXTERNAL]
          default: "CLUSTER_INTERNAL"
          description: |
            访问类型：
            - CLUSTER_INTERNAL：仅集群内部可访问
            - EXTERNAL：允许外部访问（需配置路由规则）
          example: "EXTERNAL"
        route:
          $ref: '#/components/schemas/RouteConfig'

    RouteConfig:
      type: object
      description: API 路由配置（service_type 为 EXTERNAL 时生效）
      properties:
        domain:
          type: string
          description: 域名
          example: "my-app.agentbase.com"
        path:
          type: string
          description: 路由路径
          default: "/"
          example: "/"
        path_match_type:
          type: string
          enum: [PREFIX, EXACT]
          default: "PREFIX"
          description: |
            路径匹配类型：
            - PREFIX：前缀匹配
            - EXACT：精确匹配
          example: "PREFIX"
        case_insensitive:
          type: boolean
          default: false
          description: 路径匹配是否忽略大小写
          example: false

    StorageConfig:
      type: object
      description: 存储配置
      properties:
        volumes:
          type: array
          description: 数据卷列表
          items:
            $ref: '#/components/schemas/VolumeConfig'

    VolumeConfig:
      type: object
      description: 单个数据卷配置，基于 Kubernetes StorageClass 动态分配存储
      required:
        - name
        - size
        - storage_class
      properties:
        name:
          type: string
          description: 卷名称
          example: "data-vol"
        size:
          type: string
          description: 卷大小，支持 Kubernetes 资源格式
          example: "10Gi"
        mount_path:
          type: string
          description: 容器内挂载路径
          example: "/data"
        storage_class:
          type: string
          description: |
            Kubernetes StorageClass 名称，必须是所选集群上已存在的 StorageClass。
            用户选择 K8s 集群后，由平台列出该集群可用的 StorageClass 供选择。
          example: "standard"

    # ==================================================================
    # 平台级能力：组件服务绑定
    # ==================================================================

    ServicesConfig:
      type: object
      description: |
        平台组件服务绑定配置。用于将部署实例与平台提供的各类服务进行关联，
        平台会自动将绑定的服务连接信息注入到实例的运行环境中。
      properties:
        ai_database:
          $ref: '#/components/schemas/ServiceBindingWithInstance'
        memory_store:
          $ref: '#/components/schemas/ServiceBindingWithInstance'
        ai_model:
          type: object
          description: AI 模型服务绑定
          properties:
            enabled:
              type: boolean
              description: 是否启用
              default: false
              example: true
            model_id:
              type: string
              description: 绑定的模型 ID
              example: "model-001"
        mcp_service:
          type: object
          description: MCP 服务绑定
          properties:
            enabled:
              type: boolean
              description: 是否启用
              default: false
              example: true
            endpoint:
              type: string
              format: uri
              description: MCP 服务端点地址
              example: "https://mcp.agentbase.com"
        internet_access:
          type: object
          description: 联网服务配置
          properties:
            enabled:
              type: boolean
              description: 是否启用联网服务
              default: false
              example: true
            auto_inject_env:
              type: boolean
              description: 是否自动注入代理环境变量
              default: true
              example: true

    ServiceBindingWithInstance:
      type: object
      description: 基于实例 ID 的服务绑定
      properties:
        enabled:
          type: boolean
          description: 是否启用
          default: false
          example: true
        instance_id:
          type: string
          description: 绑定的服务实例 ID
          example: "svc-001"

    # ==================================================================
    # 平台级能力：入站认证
    # ==================================================================

    InboundAuthConfig:
      type: object
      description: |
        入站身份认证配置。由平台统一管理，用于保护部署实例的 API 入口。
        平台负责认证网关的配置和密钥的生命周期管理。
      properties:
        type:
          type: string
          enum: [API_KEY, OAUTH2, NONE]
          default: "NONE"
          description: |
            认证类型：
            - API_KEY：通过 API Key 认证
            - OAUTH2：通过 OAuth 2.0 JWT 认证
            - NONE：不启用入站认证
          example: "API_KEY"
        api_key:
          type: object
          description: API Key 认证配置（type 为 API_KEY 时生效）
          properties:
            name:
              type: string
              description: API Key 名称
              example: "API Key 01"
            header_name:
              type: string
              description: 携带 API Key 的请求头名称
              default: "X-API-Key"
              example: "X-API-Key"
        oauth2:
          type: object
          description: OAuth 2.0 JWT 认证配置（type 为 OAUTH2 时生效）
          properties:
            client_id:
              type: string
              description: OAuth 2.0 客户端 ID
              example: "client-abc123"
            issuer_url:
              type: string
              format: uri
              description: OAuth 2.0 颁发者 URL
              example: "https://auth.agentbase.com"
            scopes:
              type: array
              items:
                type: string
              description: 要求的 OAuth 2.0 作用域
              example: ["read", "write"]

    # ==================================================================
    # 各资源类型的 extra_params Schema
    # ==================================================================

    LowCodePlatformParams:
      type: object
      additionalProperties: true
      description: |
        低代码平台业务参数。后端接收后直接渲染为 YAML 格式。
        包含平台管理员凭证、授权文件以及各子组件的资源配置。
      required:
        - platform_type
      properties:
        platform_type:
          type: string
          enum: [FASTGPT, DIFY]
          description: 低代码平台类型
          example: "FASTGPT"
        admin_account:
          type: string
          description: 管理员账号
          example: "admin"
        admin_password:
          type: string
          format: password
          description: 管理员密码
          example: "secureP@ss123"
        license_file_id:
          type: string
          description: 授权文件 ID
          example: "lic-001"
        components:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ComponentResourceConfig'
          description: |
            各子组件的资源配置。Key 为组件名称，Value 为该组件的资源配置。
            需要存储的组件须指定 storage_class（集群上已有的 StorageClass 名称）和 volume_size。

            常见组件：
            - **platform_manager**：平台管理面（如 fastgpt-server），支持 pod_name、storage 配置
            - **ingress**：网关组件，支持 load_balancer_id 配置
            - **pgvector**：PGVector 数据库，支持 default_username/default_password、storage 配置
            - **redis**：Redis 缓存，支持 storage 配置
            - **mongodb**：MongoDB 数据库，支持 default_username/default_password、storage 配置
          example:
            platform_manager:
              replicas: 2
              cpu_request: "1"
              cpu_limit: "2"
              memory_request: "2Gi"
              memory_limit: "4Gi"
              pod_name: "fastgpt-server"
              storage_class: "standard"
              volume_size: "10Gi"
            ingress:
              replicas: 2
              cpu_request: "0.5"
              cpu_limit: "1"
              memory_request: "1Gi"
              memory_limit: "2Gi"
              load_balancer_id: "lb-4090"

    ComponentResourceConfig:
      type: object
      additionalProperties: true
      description: |
        子组件资源配置。包含通用的计算和存储资源字段，
        以及特定组件可能需要的扩展字段（如数据库凭证、负载均衡等）。
        存储基于 StorageClass 动态分配，需指定集群上已有的 StorageClass 名称。
      properties:
        replicas:
          type: integer
          minimum: 1
          description: Pod 副本数
          example: 2
        cpu_request:
          type: string
          description: CPU 请求量
          example: "1"
        cpu_limit:
          type: string
          description: CPU 限制量
          example: "2"
        memory_request:
          type: string
          description: 内存请求量
          example: "2Gi"
        memory_limit:
          type: string
          description: 内存限制量
          example: "4Gi"
        storage_class:
          type: string
          description: |
            Kubernetes StorageClass 名称，必须是所选集群上已存在的 StorageClass。
          example: "standard"
        volume_size:
          type: string
          description: 存储卷容量，支持 Kubernetes 资源格式
          example: "10Gi"
        default_username:
          type: string
          description: 默认用户名（数据库类组件使用，如 pgvector、mongodb）
          example: "dbuser"
        default_password:
          type: string
          format: password
          description: 默认密码（数据库类组件使用，如 pgvector、mongodb）
          example: "secureP@ss"
        load_balancer_id:
          type: string
          description: 负载均衡实例 ID（网关/ingress 类组件使用）
          example: "lb-4090"
        pod_name:
          type: string
          description: 容器组（Pod）名称（平台管理面组件使用）
          example: "fastgpt-server"

    PodConfig:
      type: object
      description: |
        容器组（Pod）配置。高代码应用中每个容器组（Pod）代表一个独立的部署单元，
        拥有独立的镜像、计算资源、端口、启动命令和环境变量配置。
      required:
        - name
      properties:
        name:
          type: string
          description: 容器组（Pod）名称
          example: "pod-1"
        source:
          $ref: '#/components/schemas/ApplicationSource'
        replicas:
          type: integer
          minimum: 1
          default: 1
          description: Pod 副本数
          example: 2
        cpu:
          type: string
          description: |
            CPU 核数，支持 Kubernetes 资源格式。
            常用值：1, 2, 4, 8, 16
          example: "4"
        memory:
          type: string
          description: |
            内存大小，支持 Kubernetes 资源格式。
            常用值：512Mi, 1Gi, 2Gi, 4Gi, 8Gi, 16Gi, 32Gi
          example: "8Gi"
        storage:
          $ref: '#/components/schemas/StorageConfig'
        ports:
          type: array
          description: 端口配置列表
          items:
            $ref: '#/components/schemas/PortConfig'
        start_command:
          type: string
          description: 容器启动命令
          example: "python main.py --port 8080"
        env_vars:
          type: array
          description: 环境变量列表（Key-Value 格式）
          items:
            type: object
            required: [key, value]
            properties:
              key:
                type: string
                description: 环境变量名
                example: "API_KEY"
              value:
                type: string
                description: 环境变量值
                example: "sk-xxx"
        config_files:
          type: array
          description: 配置文件列表
          items:
            $ref: '#/components/schemas/ConfigFileRef'

    ConfigFileRef:
      type: object
      description: 配置文件引用
      required:
        - name
      properties:
        name:
          type: string
          description: 配置文件名称
          example: "config.yaml"
        content:
          type: string
          description: 配置文件内容（与 file_id 二选一）
        file_id:
          type: string
          description: 配置文件 ID（引用已上传的文件，与 content 二选一）

    HighCodeAppParams:
      type: object
      additionalProperties: true
      description: |
        高代码应用业务参数。后端接收后直接渲染为 YAML 格式。
        通过 `pods` 定义多个容器组（Pod），每个容器组（Pod）拥有独立的镜像、计算资源和配置。
      properties:
        pods:
          type: array
          description: |
            容器组（Pod）配置列表。每个容器组（Pod）代表一个独立的部署单元，
            拥有独立的镜像来源、计算资源、端口、启动命令和环境变量。
          items:
            $ref: '#/components/schemas/PodConfig'
        distribution:
          $ref: '#/components/schemas/DistributionConfig'
        api_data_format:
          type: string
          enum: [JSON, XML, YAML]
          description: API 数据格式，指定应用对外提供的 API 数据序列化格式
          default: "JSON"
          example: "JSON"
        api_key:
          type: string
          description: 应用级 API 密钥，用于应用自身的接口鉴权（区别于平台入站认证 auth）
          example: "sk-app-xxx"
        data_source_port:
          type: integer
          minimum: 1
          maximum: 65535
          description: 数据源组件绑定端口
          example: 5432
        data_catalog:
          $ref: '#/components/schemas/DataCatalogConfig'
        env_vars:
          type: array
          description: 环境变量列表（Key-Value 格式）
          items:
            type: object
            required: [key, value]
            properties:
              key:
                type: string
                description: 环境变量名
                example: "API_KEY"
              value:
                type: string
                description: 环境变量值
                example: "sk-xxx"
        env_json:
          type: string
          description: 环境变量（JSON 字符串格式），与 env_vars 合并
          example: '{"DB_HOST":"postgres.svc","DB_PORT":"5432"}'
        env_yaml:
          type: string
          description: 环境变量（YAML 字符串格式），与 env_vars 合并
          example: "DB_HOST: postgres.svc\nDB_PORT: \"5432\""

    DistributionConfig:
      type: object
      description: |
        分发配置，控制应用的发布策略和灰度发布规则。
      properties:
        mode:
          type: string
          enum: [TARGETED, FULL]
          description: |
            分发模式：
            - TARGETED：定向分发，仅发布到指定的目标实例或节点
            - FULL：全量发布，发布到所有目标实例
          default: "FULL"
          example: "FULL"
        canary_weight:
          type: integer
          minimum: 0
          maximum: 100
          description: 灰度权重百分比，控制流量分配到新版本的比例（0-100）
          example: 20
        canary_header:
          type: string
          description: 灰度发布 Header 名称，携带此 Header 的请求将路由到新版本
          example: "X-Canary"

    DataCatalogConfig:
      type: object
      description: |
        数据目录设置，用于 Helm Chart 模式下组织多层级或多分支的部署配置。
      properties:
        hierarchy_type:
          type: string
          enum: [LEVEL, BRANCH]
          description: |
            层级类型：
            - LEVEL：按等级划分（如 生产、预发、测试）
            - BRANCH：按分支划分（如 feature、release）
          example: "LEVEL"
        hierarchy_name:
          type: string
          description: 等级名称或分支名称
          example: "生产等级"

    DevEnvironmentParams:
      type: object
      additionalProperties: true
      description: |
        高代码开发环境业务参数。后端接收后直接渲染为 YAML 格式。
      required:
        - template
      properties:
        template:
          type: string
          enum: [CREWAI, LANGGRAPH]
          description: |
            开发框架模板，决定预装的框架和工具链：
            - CREWAI：CrewAI 多智能体框架
            - LANGGRAPH：LangGraph 工作流框架
          example: "CREWAI"

    GatewayParams:
      type: object
      additionalProperties: true
      description: |
        网关实例业务参数。网关的核心配置主要通过 network（负载均衡、端口）和
        compute（CPU、内存）传递，此处用于传递额外的网关特定配置。
        后端接收后直接渲染为 YAML 格式。

    DataServiceParams:
      type: object
      additionalProperties: true
      description: |
        数据服务组件业务参数。后端接收后直接渲染为 YAML 格式。
      required:
        - service_type
      properties:
        service_type:
          type: string
          enum:
            - POSTGRES
            - REDIS
            - MEM0
            - MILVUS
            - WEAVIATE
            - PGVECTOR
            - NEBULA_GRAPH
            - MONGODB
          description: |
            数据服务类型：
            - POSTGRES：PostgreSQL 关系型数据库
            - REDIS：内存缓存/消息队列
            - MEM0：Mem0 记忆存储服务
            - MILVUS：Milvus 向量数据库
            - WEAVIATE：Weaviate 向量搜索引擎
            - PGVECTOR：PostgreSQL + pgvector 向量扩展
            - NEBULA_GRAPH：NebulaGraph 图数据库
            - MONGODB：MongoDB 文档数据库
          example: "PGVECTOR"
        config:
          type: object
          additionalProperties: true
          description: 数据服务运行配置，不同 service_type 对应不同的配置项
          example:
            max_connections: 200
            shared_buffers: "2GB"
            effective_cache_size: "6GB"

    # ==================================================================
    # 创建请求：Base + 5 种资源类型 + oneOf 聚合
    # ==================================================================

    ApplicationCreateBase:
      type: object
      description: |
        创建部署实例的公共基础字段。所有资源类型共享以下基础设施参数。
      required:
        - name
        - resource_type
        - deploy_mode
        - cluster_id
        - workspace_id
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
          description: 实例名称
          example: "my-agent-app"
        description:
          type: string
          maxLength: 512
          description: 实例描述
          example: "智能客服 Agent 应用"
        resource_type:
          type: string
          enum:
            - LOW_CODE_PLATFORM
            - HIGH_CODE_APP
            - DEV_ENVIRONMENT
            - GATEWAY
            - DATA_SERVICE
          description: |
            资源类型：
            - LOW_CODE_PLATFORM：低代码平台
            - HIGH_CODE_APP：高代码应用
            - DEV_ENVIRONMENT：高代码开发环境
            - GATEWAY：网关
            - DATA_SERVICE：数据服务组件
        deploy_mode:
          type: string
          enum: [IMAGE, CHART]
          description: |
            部署模式：
            - IMAGE：直接部署容器镜像（仅 HIGH_CODE_APP 支持）
            - CHART：通过 Helm Chart 部署（所有资源类型支持）
        workspace_id:
          type: string
          format: uuid
          description: 所属工作空间 ID
          example: "w1x2y3z4-a5b6-7890-cdef-123456789abc"
        cluster_id:
          type: string
          format: uuid
          description: 目标 K8s 集群 ID
          example: "c1d2e3f4-a5b6-7890-cdef-123456789abc"
        source:
          $ref: '#/components/schemas/ApplicationSource'
        compute:
          $ref: '#/components/schemas/ComputeConfig'
        network:
          $ref: '#/components/schemas/NetworkConfig'
        storage:
          $ref: '#/components/schemas/StorageConfig'
        services:
          $ref: '#/components/schemas/ServicesConfig'
        auth:
          $ref: '#/components/schemas/InboundAuthConfig'

    LowCodePlatformCreate:
      allOf:
        - $ref: '#/components/schemas/ApplicationCreateBase'
        - type: object
          description: 低代码平台创建请求
          required:
            - extra_params
          properties:
            resource_type:
              type: string
              enum: [LOW_CODE_PLATFORM]
            extra_params:
              $ref: '#/components/schemas/LowCodePlatformParams'

    HighCodeAppCreate:
      allOf:
        - $ref: '#/components/schemas/ApplicationCreateBase'
        - type: object
          description: 高代码应用创建请求
          properties:
            resource_type:
              type: string
              enum: [HIGH_CODE_APP]
            extra_params:
              $ref: '#/components/schemas/HighCodeAppParams'

    DevEnvironmentCreate:
      allOf:
        - $ref: '#/components/schemas/ApplicationCreateBase'
        - type: object
          description: 高代码开发环境创建请求
          required:
            - extra_params
          properties:
            resource_type:
              type: string
              enum: [DEV_ENVIRONMENT]
            extra_params:
              $ref: '#/components/schemas/DevEnvironmentParams'

    GatewayCreate:
      allOf:
        - $ref: '#/components/schemas/ApplicationCreateBase'
        - type: object
          description: 网关实例创建请求
          properties:
            resource_type:
              type: string
              enum: [GATEWAY]
            extra_params:
              $ref: '#/components/schemas/GatewayParams'

    DataServiceCreate:
      allOf:
        - $ref: '#/components/schemas/ApplicationCreateBase'
        - type: object
          description: 数据服务组件创建请求
          required:
            - extra_params
          properties:
            resource_type:
              type: string
              enum: [DATA_SERVICE]
            extra_params:
              $ref: '#/components/schemas/DataServiceParams'

    ApplicationCreate:
      oneOf:
        - $ref: '#/components/schemas/LowCodePlatformCreate'
        - $ref: '#/components/schemas/HighCodeAppCreate'
        - $ref: '#/components/schemas/DevEnvironmentCreate'
        - $ref: '#/components/schemas/GatewayCreate'
        - $ref: '#/components/schemas/DataServiceCreate'
      discriminator:
        propertyName: resource_type
        mapping:
          LOW_CODE_PLATFORM: '#/components/schemas/LowCodePlatformCreate'
          HIGH_CODE_APP: '#/components/schemas/HighCodeAppCreate'
          DEV_ENVIRONMENT: '#/components/schemas/DevEnvironmentCreate'
          GATEWAY: '#/components/schemas/GatewayCreate'
          DATA_SERVICE: '#/components/schemas/DataServiceCreate'

    # ==================================================================
    # 更新请求（resource_type 不可修改，使用通用 Schema）
    # ==================================================================

    ApplicationUpdate:
      type: object
      description: |
        更新部署实例的请求体。所有字段均为可选，仅更新传入的字段。
        `resource_type` 不可修改。仅允许在 STOPPED 状态下执行更新。
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
          description: 实例名称
        description:
          type: string
          maxLength: 512
          description: 实例描述
        deploy_mode:
          type: string
          enum: [IMAGE, CHART]
          description: 部署模式
        source:
          $ref: '#/components/schemas/ApplicationSource'
        cluster_id:
          type: string
          format: uuid
          description: 目标 K8s 集群 ID
        compute:
          $ref: '#/components/schemas/ComputeConfig'
        network:
          $ref: '#/components/schemas/NetworkConfig'
        storage:
          $ref: '#/components/schemas/StorageConfig'
        services:
          $ref: '#/components/schemas/ServicesConfig'
        auth:
          $ref: '#/components/schemas/InboundAuthConfig'
        extra_params:
          type: object
          additionalProperties: true
          description: 业务扩展参数（整体替换，结构随 resource_type 不同而不同）

    # ==================================================================
    # 运行时信息 Schema（仅响应中使用，readOnly）
    # ==================================================================

    RuntimeMetrics:
      type: object
      description: 运行时资源使用指标（适用于 Pod 配置组、低代码平台子组件等）
      properties:
        name:
          type: string
          description: 组件或 Pod 配置名称
          example: "pod-1"
        cpu_used:
          type: string
          description: 已使用 CPU 核数
          example: "1"
        cpu_total:
          type: string
          description: CPU 总量
          example: "4"
        memory_used:
          type: string
          description: 已使用内存
          example: "2Gi"
        memory_total:
          type: string
          description: 内存总量
          example: "8Gi"
        volume_used:
          type: string
          description: 已使用存储
          example: "1Gi"
        volume_total:
          type: string
          description: 存储总量
          example: "10Gi"

    PodInfo:
      type: object
      description: Pod 运行信息
      properties:
        name:
          type: string
          description: Pod 名称
          example: "my-app-pod-7b9d5c-xk2l1"
        status:
          type: string
          enum: [RUNNING, PENDING, SUCCEEDED, FAILED, UNKNOWN]
          description: |
            Pod 运行状态：
            - RUNNING：运行中
            - PENDING：等待调度
            - SUCCEEDED：已完成
            - FAILED：失败
            - UNKNOWN：未知
          example: "RUNNING"
        pod_config_name:
          type: string
          description: 所属 Pod 配置名称（对应 PodConfig.name）
          example: "pod-1"
        image:
          type: string
          description: 容器镜像
          example: "docker.io/project/image:v1.0.0"
        cluster_name:
          type: string
          description: K8s 集群名称
          example: "K8s 集群01"
        ports:
          type: array
          items:
            type: integer
          description: 暴露端口列表
          example: [8081, 8082]

    SSHConfig:
      type: object
      description: SSH 连接配置（开发环境实例运行后由系统生成）
      properties:
        connection_string:
          type: string
          description: SSH 连接命令
          readOnly: true
          example: "ssh root@10.xx.xxx.xxx -p 22922"
        host:
          type: string
          description: SSH 主机地址
          readOnly: true
          example: "10.xx.xxx.xxx"
        port:
          type: integer
          description: SSH 端口
          readOnly: true
          example: 22922
        key_download_url:
          type: string
          format: uri
          description: SSH 私钥下载地址
          readOnly: true
          example: "https://agentbase.aether.com/api/v1/keys/ssh-key-001/download"

    NetworkEndpoint:
      type: object
      description: 网络端点映射，展示端口到集群内外地址的映射关系
      properties:
        port:
          type: integer
          description: 容器端口
          readOnly: true
          example: 8051
        internal_address:
          type: string
          description: 集群内访问地址
          readOnly: true
          example: "10.224.xxx.xxx:8051"
        external_address:
          type: string
          description: 集群外访问地址
          readOnly: true
          example: "10.xxx.xxx.xxx:31578"

    ImageVersion:
      type: object
      description: 镜像版本信息（开发环境构建产物）
      properties:
        version:
          type: string
          description: 版本号
          readOnly: true
          example: "v1.0.0"
        status:
          type: string
          enum: [BUILDING, BUILD_SUCCESS, BUILD_FAILED]
          description: |
            构建状态：
            - BUILDING：构建中
            - BUILD_SUCCESS：构建完成
            - BUILD_FAILED：构建失败
          readOnly: true
          example: "BUILD_SUCCESS"
        image_name:
          type: string
          description: 完整镜像名称
          readOnly: true
          example: "docker.io/imagename:v1.0.0"
        registries:
          type: array
          items:
            type: string
          description: 已上传的镜像仓库名称列表
          readOnly: true
          example: ["Docker Hub", "Harbor 仓库"]
        description:
          type: string
          description: 版本描述
          readOnly: true
        published_at:
          type: string
          format: date-time
          description: 发布时间
          readOnly: true
          example: "2026-01-15T10:00:00Z"

    # ==================================================================
    # 响应模型：Base + 5 种资源类型 + oneOf 聚合
    # ==================================================================

    ApplicationResponseBase:
      type: object
      description: 部署实例响应公共基础字段
      required:
        - id
        - name
        - resource_type
        - deploy_mode
        - status
        - cluster_id
        - workspace_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: 部署实例唯一标识
          readOnly: true
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        name:
          type: string
          description: 实例名称
          example: "my-agent-app"
        description:
          type: string
          description: 实例描述
          example: "智能客服 Agent 应用"
        resource_type:
          type: string
          enum:
            - LOW_CODE_PLATFORM
            - HIGH_CODE_APP
            - DEV_ENVIRONMENT
            - GATEWAY
            - DATA_SERVICE
          description: 资源类型
        deploy_mode:
          type: string
          enum: [IMAGE, CHART]
          description: 部署模式
        status:
          type: string
          enum: [CREATING, UPDATING, STARTING, STOPPING, RESTARTING, RUNNING, STOPPED, ERROR, DELETING]
          description: |
            实例运行状态：
            - CREATING：创建中
            - UPDATING：更新配置中
            - STARTING：启动中
            - STOPPING：停止中
            - RESTARTING：重启中
            - RUNNING：运行中
            - STOPPED：已停止
            - ERROR：异常
            - DELETING：删除中
          readOnly: true
          example: "RUNNING"
        cluster_id:
          type: string
          format: uuid
          description: 所在 K8s 集群 ID
          example: "c1d2e3f4-a5b6-7890-cdef-123456789abc"
        workspace_id:
          type: string
          format: uuid
          description: 所属工作空间 ID
          example: "w1x2y3z4-a5b6-7890-cdef-123456789abc"
        cluster_name:
          type: string
          description: K8s 集群名称（冗余字段，方便前端展示）
          readOnly: true
          example: "K8s 集群01"
        source:
          $ref: '#/components/schemas/ApplicationSource'
        compute:
          $ref: '#/components/schemas/ComputeConfig'
        network:
          $ref: '#/components/schemas/NetworkConfig'
        storage:
          $ref: '#/components/schemas/StorageConfig'
        services:
          $ref: '#/components/schemas/ServicesConfig'
        auth:
          $ref: '#/components/schemas/InboundAuthConfig'
        access_urls:
          type: array
          items:
            type: string
            format: uri
          description: 外部访问 URL 列表（实例运行后由系统生成）
          readOnly: true
          example:
            - "https://my-agent-app.agentbase.com"
        progress:
          type: integer
          minimum: -1
          maximum: 100
          description: |
            操作进度百分比：
            - -1：无进度信息
            - 0-99：操作进行中
            - 100：操作完成
          readOnly: true
          example: 100
        error_message:
          type: string
          description: 错误详情（status 为 ERROR 时有值）
          readOnly: true
          example: "Pod CrashLoopBackOff: OOMKilled"
        creator_id:
          type: string
          format: uuid
          description: 创建者用户 ID
          readOnly: true
          example: "u1v2w3x4-y5z6-7890-abcd-ef1234567890"
        created_at:
          type: string
          format: date-time
          description: 创建时间
          readOnly: true
          example: "2026-01-15T08:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: 最后更新时间
          readOnly: true
          example: "2026-01-15T08:35:00Z"

    LowCodePlatformResponse:
      allOf:
        - $ref: '#/components/schemas/ApplicationResponseBase'
        - type: object
          properties:
            resource_type:
              type: string
              enum: [LOW_CODE_PLATFORM]
            extra_params:
              $ref: '#/components/schemas/LowCodePlatformParams'
            components_status:
              type: object
              readOnly: true
              additionalProperties:
                $ref: '#/components/schemas/RuntimeMetrics'
              description: |
                各子组件运行时状态，Key 为组件名称（如 platform_manager、pgvector、redis 等），
                Value 为该组件的运行时资源使用指标。

    HighCodeAppResponse:
      allOf:
        - $ref: '#/components/schemas/ApplicationResponseBase'
        - type: object
          properties:
            resource_type:
              type: string
              enum: [HIGH_CODE_APP]
            extra_params:
              $ref: '#/components/schemas/HighCodeAppParams'
            pods_runtime:
              type: array
              readOnly: true
              description: 各容器组（Pod）运行时资源使用指标
              items:
                $ref: '#/components/schemas/RuntimeMetrics'
            pod_instances:
              type: array
              readOnly: true
              description: Pod 运行实例列表
              items:
                $ref: '#/components/schemas/PodInfo'

    DevEnvironmentResponse:
      allOf:
        - $ref: '#/components/schemas/ApplicationResponseBase'
        - type: object
          properties:
            resource_type:
              type: string
              enum: [DEV_ENVIRONMENT]
            extra_params:
              $ref: '#/components/schemas/DevEnvironmentParams'
            ssh_config:
              allOf:
                - $ref: '#/components/schemas/SSHConfig'
              readOnly: true
              description: SSH 连接配置（实例运行后由系统生成）
            network_endpoints:
              type: array
              readOnly: true
              description: 网络端点映射（端口到集群内外地址）
              items:
                $ref: '#/components/schemas/NetworkEndpoint'
            image_versions:
              type: array
              readOnly: true
              description: 镜像版本列表
              items:
                $ref: '#/components/schemas/ImageVersion'

    GatewayResponse:
      allOf:
        - $ref: '#/components/schemas/ApplicationResponseBase'
        - type: object
          properties:
            resource_type:
              type: string
              enum: [GATEWAY]
            extra_params:
              $ref: '#/components/schemas/GatewayParams'

    DataServiceResponse:
      allOf:
        - $ref: '#/components/schemas/ApplicationResponseBase'
        - type: object
          properties:
            resource_type:
              type: string
              enum: [DATA_SERVICE]
            extra_params:
              $ref: '#/components/schemas/DataServiceParams'

    ApplicationResponse:
      oneOf:
        - $ref: '#/components/schemas/LowCodePlatformResponse'
        - $ref: '#/components/schemas/HighCodeAppResponse'
        - $ref: '#/components/schemas/DevEnvironmentResponse'
        - $ref: '#/components/schemas/GatewayResponse'
        - $ref: '#/components/schemas/DataServiceResponse'
      discriminator:
        propertyName: resource_type
        mapping:
          LOW_CODE_PLATFORM: '#/components/schemas/LowCodePlatformResponse'
          HIGH_CODE_APP: '#/components/schemas/HighCodeAppResponse'
          DEV_ENVIRONMENT: '#/components/schemas/DevEnvironmentResponse'
          GATEWAY: '#/components/schemas/GatewayResponse'
          DATA_SERVICE: '#/components/schemas/DataServiceResponse'

    # ==================================================================
    # 列表响应
    # ==================================================================

    ApplicationListResponse:
      type: object
      description: 部署实例列表响应
      required:
        - data
        - pagination
      properties:
        data:
          type: array
          description: 部署实例列表
          items:
            $ref: '#/components/schemas/ApplicationResponse'
        pagination:
          $ref: 'common.yaml#/components/schemas/Pagination'
